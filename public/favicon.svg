<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Wood-grain letter B on parchment background">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8d7a9" />
      <stop offset="100%" stop-color="#f1c286" />
    </linearGradient>
    <linearGradient id="bBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5a04c" />
      <stop offset="55%" stop-color="#c9842a" />
      <stop offset="100%" stop-color="#9c5d17" />
    </linearGradient>
    <linearGradient id="bShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd9a3" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#9a571d" stop-opacity="0.3" />
    </linearGradient>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="28" height="52">
      <path d="M0 8 Q10 0 20 8" fill="none" stroke="#9c5222" stroke-width="1.6" stroke-linecap="round" />
      <path d="M0 18 Q10 8 20 18" fill="none" stroke="#8a4215" stroke-width="1.2" stroke-linecap="round" />
      <path d="M0 30 Q10 20 20 30" fill="none" stroke="#924815" stroke-width="1.1" stroke-linecap="round" />
      <path d="M0 40 Q10 32 20 40" fill="none" stroke="#a4662c" stroke-width="1" stroke-linecap="round" />
      <path d="M18 4 A5 12 0 1 0 18 24" fill="none" stroke="#7a3517" stroke-width="1.2" />
      <path d="M22 32 A5 10 0 1 0 22 48" fill="none" stroke="#6b2d0f" stroke-width="1" />
    </pattern>
    <clipPath id="bClip">
      <text x="32" y="38" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700">
        B
      </text>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="12" ry="12" fill="url(#bgGradient)" />
  <rect x="4" y="4" width="56" height="56" rx="10" ry="10" fill="#f9d8b4" />

  <text x="32" y="38" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" fill="url(#bBase)">
    B
  </text>
  <text x="32" y="38" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" fill="none" stroke="#fce5bf" stroke-width="1" stroke-linejoin="round" stroke-opacity="0.6">
    B
  </text>

  <g clip-path="url(#bClip)" opacity="0.85">
    <rect width="64" height="64" fill="url(#grain)" />
    <rect width="64" height="64" fill="url(#bShade)" />
  </g>

  <rect x="3" y="3" width="58" height="58" rx="12" ry="12" fill="none" stroke="#e8c69c" stroke-width="2" opacity="0.7" />
</svg>
